# Use JDK 17 to run Gradle 8.11 (not 25). See gradle/gradle-daemon-jvm.properties and .java-version.
# Apple Silicon + Homebrew: register JDK 17 (java_home often omits it). Intel: /usr/local/opt/...; Linux CI: ignore if missing.
org.gradle.java.installations.paths=/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
